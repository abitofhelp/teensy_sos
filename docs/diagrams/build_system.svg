.52,540.9419,625.52,549.9419" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="136.7412" x="488.52" y="181.0017">aliases generic verbs</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="101.9688" x="505.9062" y="196.8011">to -$(BUILDER)</text></g><!--link Root to Board--><g class="link" data-entity-1="ent0002" data-entity-2="ent0011" data-link-type="dependency" data-source-line="54" id="lnk16"><path d="M1032.26,132.0219 C1138.16,132.0219 1342,132.0219 1342,132.0219 C1342,132.0219 1342,214.5619 1342,260.3819" fill="none" id="Root-to-Board" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#000000" points="1342,265.3819,1346,256.3819,1342,260.3819,1338,256.3819,1342,265.3819" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187.478" x="1065.81" y="129.0917">HEX ?= $(HEX_$(BUILDER))</text></g><!--link Board to Contract--><g class="link" data-entity-1="ent0011" data-entity-2="ent0001" data-link-type="dependency" data-source-line="55" id="lnk17"><path d="M1342,319.6819 C1342,385.7719 1342,550.0219 1342,550.0219 C1342,550.0219 630.08,550.0219 541.86,550.0219" fill="none" id="Board-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#000000" points="536.86,550.0219,545.86,554.0219,541.86,550.0219,545.86,546.0219,536.86,550.0219" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="116.5684" x="937.6" y="531.0917">flash uses $(HEX)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="58.6396" x="966.5644" y="546.8911">(air-gap)</text></g><!--link Stm32 to GMN18--><g class="link" data-entity-1="ent0009" data-entity-2="ent0019" data-link-type="association" data-source-line="58" id="lnk20"><path d="M87,265.1719 C87,236.3119 87,195.0219 87,195.0219 C87,195.0219 1676,195.0219 1676,195.0219 C1676,195.0219 1676,216.8219 1676,239.8219" fill="none" id="Stm32-GMN18" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g></g></svg>