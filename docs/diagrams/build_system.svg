<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="565px" preserveAspectRatio="none" style="width:1463px;height:565px;background:#FFFFFF;" version="1.1" viewBox="0 0 1463 565" width="1463px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="7"><text fill="#000000" font-family="Verdana" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="265.0098" x="598.2065" y="37.1182">Modular build system</text><text fill="#000000" font-family="Verdana" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="756.8086" x="352.3071" y="63.8555">Each builder fragment realizes one verb-first target contract;</text><text fill="#000000" font-family="Verdana" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="705.7402" x="377.8413" y="90.5928">the root binds the generic verbs to the selected BUILDER</text></g><!--cluster Builders--><g class="cluster" data-qualified-name="Builders" data-source-line="32" id="ent0006"><path d="M13.5,112.2119 L214.0889,112.2119 A3.75,3.75 0 0 1 216.5889,114.7119 L223.5889,135.2266 L615.5,135.2266 A2.5,2.5 0 0 1 618,137.7266 L618,215.7419 A2.5,2.5 0 0 1 615.5,218.2419 L13.5,218.2419 A2.5,2.5 0 0 1 11,215.7419 L11,114.7119 A2.5,2.5 0 0 1 13.5,112.2119" fill="#FFF3E0" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="11" x2="223.5889" y1="135.2266" y2="135.2266"/><text fill="#000000" font-family="Verdana" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="199.5889" x="15" y="128.2871">mk/  (builder fragments)</text></g><!--cluster Boards--><g class="cluster" data-qualified-name="Boards" data-source-line="41" id="ent0010"><path d="M644.5,112.2119 L742.8164,112.2119 A3.75,3.75 0 0 1 745.3164,114.7119 L752.3164,135.2266 L901.5,135.2266 A2.5,2.5 0 0 1 904,137.7266 L904,215.7419 A2.5,2.5 0 0 1 901.5,218.2419 L644.5,218.2419 A2.5,2.5 0 0 1 642,215.7419 L642,114.7119 A2.5,2.5 0 0 1 644.5,112.2119" fill="#E3F2FD" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="642" x2="752.3164" y1="135.2266" y2="135.2266"/><text fill="#000000" font-family="Verdana" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="97.3164" x="646" y="128.2871">mk/boards/</text></g><!--entity Root--><g class="entity" data-qualified-name="Root" data-source-line="18" id="ent0002"><rect fill="#FFE0B2" height="37.0146" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="123.8994" x="943.05" y="156.7119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="103.8994" x="953.05" y="180.7871">Makefile (root)</text></g><!--entity Pio--><g class="entity" data-qualified-name="Builders.Pio" data-source-line="33" id="ent0007"><rect fill="#FFFFFF" height="54.0293" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="197.3242" x="201.34" y="148.2119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="127.0938" x="211.34" y="172.2871">mk/platformio.mk</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="177.3242" x="211.34" y="189.3018">(default; + offline cache)</text></g><!--entity Arduino--><g class="entity" data-qualified-name="Builders.Arduino" data-source-line="34" id="ent0008"><rect fill="#FFFFFF" height="54.0293" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="148.085" x="453.96" y="148.2119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="108.418" x="463.96" y="172.2871">mk/arduino.mk</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="128.085" x="463.96" y="189.3018">(GNU C++20 CLI)</text></g><!--entity Stm32--><g class="entity" data-qualified-name="Builders.Stm32" data-source-line="35" id="ent0009"><rect fill="#EEEEEE" height="54.0293" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="119.4834" x="27.26" y="148.2119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="99.4834" x="37.26" y="172.2871">mk/stm32.mk</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="55.1865" x="37.26" y="189.3018">(future)</text></g><!--entity Board--><g class="entity" data-qualified-name="Boards.Board" data-source-line="42" id="ent0011"><rect fill="#FFFFFF" height="54.0293" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="230.7314" x="657.63" y="148.2119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="91.4307" x="667.63" y="172.2871">teensy41.mk</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="210.7314" x="667.63" y="189.3018">flash (air-gap, teensy_loader)</text></g><!--entity Contract--><g class="entity" data-qualified-name="Contract" data-source-line="13" id="ent0001"><ellipse cx="528" cy="432.6219" fill="#FFFDE7" rx="8" ry="8" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="122.8076" x="452.1553" y="463.6971">&#171;target contract&#187;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="89.6123" x="452.1553" y="480.7118">build-&lt;tool&gt;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="102.6758" x="452.1553" y="497.7264">upload-&lt;tool&gt;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="110.4277" x="452.1553" y="514.7411">monitor-&lt;tool&gt;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="92.3672" x="452.1553" y="531.7557">clean-&lt;tool&gt;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="151.6895" x="452.1553" y="548.7704">(+ check-tools:: line)</text></g><g class="entity" data-qualified-name="GMN3" data-source-line="21" id="ent0004"><path d="M803.45,380.2219 L803.45,485.0178 A0,0 0 0 0 803.45,485.0178 L1206.5472,485.0178 A0,0 0 0 0 1206.5472,485.0178 L1206.5472,390.2219 L1196.5472,380.2219 L1029.65,380.2219 L1025.65,194.1519 L1021.65,380.2219 L803.45,380.2219 A0,0 0 0 0 803.45,380.2219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1196.5472,380.2219 L1196.5472,390.2219 L1206.5472,390.2219 L1196.5472,380.2219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280.6045" x="809.45" y="398.2917">Common logic only: host detection, colors,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="152.0327" x="809.45" y="414.0911">helper macros, and the</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="128.502" x="966.053" y="414.0911">BUILDER selector</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.729" x="1094.555" y="414.0911">.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="227.7349" x="809.45" y="429.8904">Generic verbs are one-line aliases:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="177.7598" x="818.5906" y="445.6897">build  -&gt; build-$(BUILDER)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="247.3364" x="818.5906" y="461.489">upload -&gt; upload-$(BUILDER)   (etc.)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="382.0972" x="809.45" y="477.2883">include $(wildcard mk/boards/*.mk) $(wildcard mk/*.mk)</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="57" id="ent0018"><path d="M1121.58,122.8219 L1121.58,227.6178 L1448.4228,227.6178 L1448.4228,132.8219 L1438.4228,122.8219 L1121.58,122.8219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1438.4228,122.8219 L1438.4228,132.8219 L1448.4228,132.8219 L1438.4228,122.8219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="264.9766" x="1127.58" y="140.8917">Extension point: drop in a fragment that</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="257.3975" x="1127.58" y="156.6911">realizes the contract and it is picked up</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272.5747" x="1127.58" y="172.4904">automatically - no edits to the root or the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="305.8428" x="1127.58" y="188.2897">other fragments. Remove a fragment (e.g. the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="284.1021" x="1127.58" y="204.089">PlatformIO-free RTX subset) and its builder</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="266.5254" x="1127.58" y="219.8883">simply disappears; BUILDER re-defaults.</text></g><!--link Pio to Contract--><g class="link" data-entity-1="ent0007" data-entity-2="ent0001" data-link-type="extension" data-source-line="46" id="lnk12"><path d="M398.87,175.6219 C426.67,175.6219 449.48,175.6219 449.48,175.6219 C449.48,175.6219 449.48,410.6219 449.48,414.5719" fill="none" id="Pio-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="449.48,432.5719,455.48,414.5719,443.48,414.5719,449.48,432.5719" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="49.5815" x="399.48" y="275.8617">realizes</text></g><!--link Arduino to Contract--><g class="link" data-entity-1="ent0008" data-entity-2="ent0001" data-link-type="extension" data-source-line="47" id="lnk13"><path d="M528,202.2819 C528,259.3319 528,371.5419 528,406.0819" fill="none" id="Arduino-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="528,424.0819,534,406.0819,522,406.0819,528,424.0819" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="49.5815" x="478" y="310.2517">realizes</text></g><!--link Stm32 to Contract--><g class="link" data-entity-1="ent0009" data-entity-2="ent0001" data-link-type="extension" data-source-line="48" id="lnk14"><path d="M106.91,202.2819 C106.91,268.3719 106.91,432.6219 106.91,432.6219 C106.91,432.6219 440.74,432.6219 501.21,432.6219" fill="none" id="Stm32-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="519.21,432.6219,501.21,426.6219,501.21,438.6219,519.21,432.6219" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="95.748" x="101.89" y="429.6917">realizes (later)</text></g><!--link Root to Contract--><g class="link" data-entity-1="ent0002" data-entity-2="ent0001" data-link-type="dependency" data-source-line="51" id="lnk15"><path d="M984.35,194.1119 C984.35,239.0519 984.35,348.6219 984.35,348.6219 C984.35,348.6219 540.1,348.6219 533.08,348.6219" fill="none" id="Root-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#000000" points="528.08,348.6219,537.08,352.6219,533.08,348.6219,537.08,344.6219,528.08,348.6219" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="136.7412" x="696.47" y="329.6917">aliases generic verbs</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="101.9688" x="713.8562" y="345.4911">to -$(BUILDER)</text></g><!--link Board to Contract--><g class="link" data-entity-1="ent0011" data-entity-2="ent0001" data-link-type="dependency" data-source-line="54" id="lnk16"><path d="M657.37,175.6219 C628.97,175.6219 606.52,175.6219 606.52,175.6219 C606.52,175.6219 606.52,423.6219 606.52,427.5719" fill="none" id="Board-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#000000" points="606.52,432.5719,610.52,423.5719,606.52,427.5719,602.52,423.5719,606.52,432.5719" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="187.478" x="607.52" y="259.7417">HEX ?= $(HEX_$(BUILDER))</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="94.1548" x="654.1816" y="275.5411">(air-gap flash)</text></g><!--link Stm32 to GMN17--><g class="link" data-entity-1="ent0009" data-entity-2="ent0018" data-link-type="association" data-source-line="57" id="lnk19"><path d="M67.09,202.5919 C67.09,209.3119 67.09,214.6219 67.09,214.6219 C67.09,214.6219 789.22,214.6219 1121.38,214.6219" fill="none" id="Stm32-GMN17" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g></g></svg>