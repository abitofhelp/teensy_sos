<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="682px" preserveAspectRatio="none" style="width:1854px;height:682px;background:#FFFFFF;" version="1.1" viewBox="0 0 1854 682" width="1854px" zoomAndPan="magnify"><?plantuml 1.2026.6?><defs/><g><g class="title" data-source-line="7"><text fill="#000000" font-family="Verdana" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="265.0098" x="793.7065" y="37.1182">Modular build system</text><text fill="#000000" font-family="Verdana" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="756.8086" x="547.8071" y="63.8555">Each builder fragment realizes one verb-first target contract;</text><text fill="#000000" font-family="Verdana" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="705.7402" x="573.3413" y="90.5928">the root binds the generic verbs to the selected BUILDER</text></g><!--cluster Builders--><g class="cluster" data-qualified-name="Builders" data-source-line="32" id="ent0006"><path d="M13.5,229.6119 L214.0889,229.6119 A3.75,3.75 0 0 1 216.5889,232.1119 L223.5889,252.6266 L615.5,252.6266 A2.5,2.5 0 0 1 618,255.1266 L618,333.1419 A2.5,2.5 0 0 1 615.5,335.6419 L13.5,335.6419 A2.5,2.5 0 0 1 11,333.1419 L11,232.1119 A2.5,2.5 0 0 1 13.5,229.6119" fill="#FFF3E0" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="11" x2="223.5889" y1="252.6266" y2="252.6266"/><text fill="#000000" font-family="Verdana" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="199.5889" x="15" y="245.6871">mk/  (builder fragments)</text></g><!--cluster Boards--><g class="cluster" data-qualified-name="Boards" data-source-line="41" id="ent0010"><path d="M1213.5,229.6119 L1311.8164,229.6119 A3.75,3.75 0 0 1 1314.3164,232.1119 L1321.3164,252.6266 L1470.5,252.6266 A2.5,2.5 0 0 1 1473,255.1266 L1473,333.1419 A2.5,2.5 0 0 1 1470.5,335.6419 L1213.5,335.641