 fill="#EEEEEE" height="54.0293" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="119.4834" x="27.26" y="265.6119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="99.4834" x="37.26" y="289.6871">mk/stm32.mk</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="55.1865" x="37.26" y="306.7018">(future)</text></g><!--entity Board--><g class="entity" data-qualified-name="Boards.Board" data-source-line="42" id="ent0011"><rect fill="#FFFFFF" height="54.0293" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="230.7314" x="1226.63" y="265.6119"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="91.4307" x="1236.63" y="289.6871">teensy41.mk</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="210.7314" x="1236.63" y="306.7018">flash (air-gap, teensy_loader)</text></g><!--entity Contract--><g class="entity" data-qualified-name="Contract" data-source-line="13" id="ent0001"><ellipse cx="528" cy="550.0219" fill="#FFFDE7" rx="8" ry="8" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="122.8076" x="414.2124" y="581.0971">&#171;target contract&#187;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="217.0684" x="414.2124" y="598.1118">build-&lt;tool&gt;  &#183;  upload-&lt;tool&gt;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="227.5752" x="414.2124" y="615.1264">monitor-&lt;tool&gt;  &#183;  clean-&lt;tool&gt;</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="203.2393" x="414.2124" y="632.1411">check-&lt;tool&gt;  (build prereq)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="212.3994" x="414.2124" y="649.1557">HEX_&lt;tool&gt;  (built .hex path)</text><text fill="#000000" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="151.6895" x="414.2124" y="666.1704">(+ check-tools:: line)</text></g><g class="entity" data-qualified-name="GMN3" data-source-line="21" id="ent0004"><path d="M768.45,240.2219 L768.45,345.0178 A0,0 0 0 0 768.45,345.0178 L1171.5472,345.0178 A0,0 0 0 0 1171.5472,345.0178 L1171.5472,250.2219 L1161.5472,240.2219 L974,240.2219 L970,150.4919 L966,240.2219 L768.45,240.2219 A0,0 0 0 0 768.45,240.2219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1161.5472,240.2219 L1161.5472,250.2219 L1171.5472,250.2219 L1161.5472,240.2219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="280.6045" x="774.45" y="258.2917">Common logic only: host detection, colors,</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="152.0327" x="774.45" y="274.0911">helper macros, and the</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="128.502" x="931.053" y="274.0911">BUILDER selector</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.729" x="1059.555" y="274.0911">.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="227.7349" x="774.45" y="289.8904">Generic verbs are one-line aliases:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="177.7598" x="783.5906" y="305.6897">build  -&gt; build-$(BUILDER)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="247.3364" x="783.5906" y="321.489">upload -&gt; upload-$(BUILDER)   (etc.)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="382.0972" x="774.45" y="337.2883">include $(wildcard mk/boards/*.mk) $(wildcard mk/*.mk)</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="58" id="ent0019"><path d="M1512.58,240.2219 L1512.58,345.0178 L1839.4228,345.0178 L1839.4228,250.2219 L1829.4228,240.2219 L1512.58,240.2219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1829.4228,240.2219 L1829.4228,250.2219 L1839.4228,250.2219 L1829.4228,240.2219" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="264.9766" x="1518.58" y="258.2917">Extension point: drop in a fragment that</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="257.3975" x="1518.58" y="274.0911">realizes the contract and it is picked up</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272.5747" x="1518.58" y="289.8904">automatically - no edits to the root or the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="305.8428" x="1518.58" y="305.6897">other fragments. Remove a fragment (e.g. the</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="284.1021" x="1518.58" y="321.489">PlatformIO-free RTX subset) and its builder</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="266.5254" x="1518.58" y="337.2883">simply disappears; BUILDER re-defaults.</text></g><!--link Pio to Contract--><g class="link" data-entity-1="ent0007" data-entity-2="ent0001" data-link-type="extension" data-source-line="46" id="lnk12"><path d="M398.89,293.0219 C417.09,293.0219 430.48,293.0219 430.48,293.0219 C430.48,293.0219 430.48,528.0219 430.48,531.9719" fill="none" id="Pio-to-Contract" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="none" points="430.48,549.9719,436.48,531.9719,424.48,531.9719,430.48,