name=TeensySos
version=1.0.0
author=Michael Gardner, A Bit of Help, Inc.
maintainer=Michael Gardner <mjgardner@abitofhelp.com>
sentence=Canonical SOS Morse RGB-LED implementation: hexagonal core plus Teensy adapters.
paragraph=The single, canonical C++20 implementation shared by both command-line frontends (PlatformIO CLI and Arduino CLI). It holds the domain types, the Morse encoder, the port interfaces, the templated SosController, and the Teensy clock/LED adapters. The PlatformIO and Arduino composition roots are thin and contain no duplicated application logic. Requires GNU C++20.
