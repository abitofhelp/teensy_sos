; PlatformIO project for the Teensy 4.1 SOS Morse RGB-LED demo.
;
; This is a clean-room starter/reference project: it pairs a reusable
; cross-platform build + offline-cache scaffold with a trivial, non-proprietary
; domain (blink SOS in Morse on an RGB LED).
;
; The default USB type (Serial) is fine for a blinker; no -D USB_RAWHID here.
;
; Core-profile flags mirror the A Bit of Help C++ house standard: exceptions and
; RTTI are disabled. Teensy's Arduino core builds cleanly without them. These
; flags apply to the whole build, so the Teensy C core may emit a benign
; "-fno-rtti valid for C++ but not C" note during compilation; it is expected and
; does not affect the produced firmware.

[env:teensy41]
; Platform pinned to an exact version for deterministic, offline/air-gap-friendly
; builds (see docs/BUILD.md). The registry-qualified form is used; if a toolchain
; rejects it, `teensy@5.2.0` is the equivalent short form.
platform      = platformio/teensy@5.2.0
board         = teensy41
framework     = arduino
build_flags   =
    -std=gnu++20
    -fno-exceptions
    -fno-rtti
    -Wall
    -Wextra
build_unflags =
    -std=gnu++17

; ---------------------------------------------------------------------------
; Optional debug profile (LOCAL development only; the release env above is the
; canonical build and is left byte-for-byte unchanged). It inherits everything
; from [env:teensy41] and adds debug symbols with light, debugger-friendly
; optimization: -Og keeps the code close to the source, -g3 includes macro
; definitions, and -fno-omit-frame-pointer keeps backtraces reliable.
;
; IMPORTANT: the Teensy 4.1 has NO on-board debug probe. Building this profile
; gives you a symbol-rich .elf you can inspect, but source-level debugging of the
; RUNNING firmware (breakpoints, single-step on the chip) requires an EXTERNAL
; SWD/JTAG probe (e.g. a Segger J-Link) wired to the Teensy's SWD pads. Without a
; probe, debug the domain/application logic with the host unit tests instead
; (`make debug-host`) and use serial prints on the board. See DEBUGGING.md.
;
; Build it with `make build-debug` (or `pio run -e teensy41_debug`).
[env:teensy41_debug]
extends       = env:teensy41
build_type    = debug
build_flags   =
    ${env:teensy41.build_flags}
    -Og
    -g3
    -fno-omit-frame-pointer
; The expected probe for on-chip debugging. Only `pio debug` consults this;
; `pio run -e teensy41_debug` (a plain build) does not require the probe.
debug_tool    = jlink
